<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K.I.N.E.T.I.C.</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #0f3460; }
header h1 { font-size: 16px; font-weight: 600; flex: 1; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.status-dot.connected { background: #4ade80; }
.status-dot.disconnected { background: #f87171; }
.status-dot.recording { background: #ef4444; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
#chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
.msg.user { align-self: flex-end; background: #0f3460; border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: #16213e; border-bottom-left-radius: 4px; }
.msg .time { font-size: 11px; opacity: 0.5; margin-top: 4px; }
#input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #16213e; border-top: 1px solid #0f3460; }
#input-bar input { flex: 1; padding: 10px 14px; border: 1px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
#input-bar input:focus { border-color: #4ade80; }
#input-bar button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
#btn-send { background: #4ade80; color: #1a1a2e; font-weight: 600; }
#btn-voice { background: #0f3460; color: #e0e0e0; }
#btn-voice.active { background: #ef4444; }
#settings-panel { display: none; padding: 16px; background: #16213e; border-top: 1px solid #0f3460; gap: 8px; flex-direction: column; }
#settings-panel.open { display: flex; }
#settings-panel label { font-size: 13px; opacity: 0.8; }
#settings-panel input { padding: 8px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 13px; }
</style>
</head>
<body>
<header>
  <span class="status-dot" id="status-dot"></span>
  <h1>K.I.N.E.T.I.C.</h1>
  <button onclick="toggleSettings()" style="background:none;border:none;color:#e0e0e0;cursor:pointer;font-size:18px">&#9881;</button>
</header>
<div id="chat"></div>
<div id="settings-panel">
  <label>API URL</label><input id="s-api" value="http://localhost:18789/api/chat">
  <label>Voice</label><input id="s-voice" value="en-GB-RyanNeural">
  <label>Speed</label><input id="s-speed" value="+20%">
  <label>Hotkey</label><input id="s-hotkey" value="alt+v">
  <button onclick="saveSettings()" style="background:#4ade80;color:#1a1a2e;border:none;padding:8px;border-radius:6px;font-weight:600;cursor:pointer">Save</button>
</div>
<div id="input-bar">
  <input id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()">
  <button id="btn-voice" onclick="toggleVoice()">&#127908;</button>
  <button id="btn-send" onclick="send()">Send</button>
</div>
<script>
let isVoiceActive = false;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
const API = document.getElementById('s-api').value;

async function send() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  addMsg('...', 'bot', 'thinking');
  try {
    const r = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:text, voice:true}) });
    const d = await r.json();
    document.querySelector('.msg.bot:last-child')?.remove();
    addMsg(d.response || '(no response)', 'bot');
  } catch(e) { document.querySelector('.thinking')?.remove(); addMsg('Error: '+e.message, 'bot'); }
}

function addMsg(text, cls, id) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  if (id) div.id = id;
  div.textContent = text;
  const time = document.createElement('div');
  time.className = 'time';
  time.textContent = new Date().toLocaleTimeString();
  div.appendChild(time);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function toggleVoice() {
  const btn = document.getElementById('btn-voice');
  if (!isVoiceActive) {
    isVoiceActive = true;
    btn.classList.add('active');
    btn.textContent = '⏹';
    await startRecording();
  } else {
    stopRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      audioChunks = [];
      isVoiceActive = false;
      btn.classList.remove('active');
      btn.textContent = '🎤';
      if (blob.size < 1000) return;

      // Send to API
      addMsg('(voice input...)', 'user');
      addMsg('...', 'bot', 'thinking');
      const form = new FormData();
      form.append('file', blob, 'voice.webm');
      form.append('message', '');
      try {
        const r = await fetch(API.replace('/chat','/chat/upload'), { method:'POST', body:form });
        const d = await r.json();
        document.querySelector('.msg.bot:last-child')?.remove();
        addMsg(d.response || '(no response)', 'bot');
      } catch(e) { document.querySelector('.thinking')?.remove(); addMsg('Error: '+e.message, 'bot'); }
    };
    audioChunks = [];
    mediaRecorder.start();
  } catch(e) { alert('Microphone access denied: '+e.message); }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function saveSettings() {
  const keys = ['api','voice','speed','hotkey'];
  keys.forEach(k => localStorage.setItem('kinetic_'+k, document.getElementById('s-'+k).value));
  toggleSettings();
}

// Load saved settings
['api','voice','speed','hotkey'].forEach(k => {
  const v = localStorage.getItem('kinetic_'+k);
  if (v) document.getElementById('s-'+k).value = v;
});

// Periodically check server status
setInterval(async () => {
  const dot = document.getElementById('status-dot');
  try {
    const r = await fetch(API.replace('/chat','/status'));
    dot.className = 'status-dot connected';
  } catch(e) { dot.className = 'status-dot disconnected'; }
}, 5000);
</script>
</body>
</html>
